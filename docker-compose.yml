version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: groundcontrol_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: groundcontrol
      POSTGRES_PASSWORD: groundcontrol_secret
      POSTGRES_DB: groundcontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groundcontrol_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://groundcontrol:groundcontrol_secret@db:5432/groundcontrol
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: groundcontrol_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
